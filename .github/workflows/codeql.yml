name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-swift:
    name: Analyze Swift
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build Core-Monitor for CodeQL
        env:
          RUNNER_DERIVED_DATA: ${{ runner.temp }}/DerivedData
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import subprocess
          import sys

          derived_data = os.environ["RUNNER_DERIVED_DATA"]
          pathlib.Path(derived_data).mkdir(parents=True, exist_ok=True)

          cmd = [
              "xcodebuild",
              "-project", "Core-Monitor.xcodeproj",
              "-scheme", "Core-Monitor",
              "-configuration", "Debug",
              "-destination", "platform=macOS",
              "-derivedDataPath", derived_data,
              "CODE_SIGNING_ALLOWED=NO",
              "CODE_SIGNING_REQUIRED=NO",
              "CODE_SIGN_IDENTITY=",
              "SWIFT_ENABLE_EXPLICIT_MODULES=NO",
              "CLANG_ENABLE_EXPLICIT_MODULES=NO",
              "COMPILER_INDEX_STORE_ENABLE=NO",
              "ONLY_ACTIVE_ARCH=YES",
              "-showBuildTimingSummary",
              "build",
          ]

          try:
              completed = subprocess.run(cmd, check=False, timeout=1200)
          except subprocess.TimeoutExpired:
              print("xcodebuild timed out after 20 minutes", file=sys.stderr)
              sys.exit(124)

          sys.exit(completed.returncode)
          PY

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
