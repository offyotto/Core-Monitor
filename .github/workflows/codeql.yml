name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-swift:
    name: Analyze Swift
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build Core-Monitor for CodeQL
        env:
          BUILD_LOG_PATH: ${{ runner.temp }}/codeql-xcodebuild.log
          RUNNER_DERIVED_DATA: ${{ runner.temp }}/DerivedData
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import subprocess
          import sys
          import time

          build_log = os.environ["BUILD_LOG_PATH"]
          derived_data = os.environ["RUNNER_DERIVED_DATA"]
          pathlib.Path(derived_data).mkdir(parents=True, exist_ok=True)

          cmd = [
              "xcodebuild",
              "-project", "Core-Monitor.xcodeproj",
              "-scheme", "Core-Monitor",
              "-configuration", "Debug",
              "-destination", "platform=macOS",
              "-derivedDataPath", derived_data,
              "CODE_SIGNING_ALLOWED=NO",
              "CODE_SIGNING_REQUIRED=NO",
              "CODE_SIGN_IDENTITY=",
              "COMPILER_INDEX_STORE_ENABLE=NO",
              "ONLY_ACTIVE_ARCH=YES",
              "-quiet",
              "build",
          ]

          start = time.monotonic()
          timed_out = False

          with open(build_log, "w", buffering=1) as log_file:
              process = subprocess.Popen(
                  cmd,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  text=True,
                  bufsize=1,
              )
              assert process.stdout is not None

              for line in process.stdout:
                  log_file.write(line)
                  sys.stdout.write(line)
                  sys.stdout.flush()
                  if time.monotonic() - start > 1200:
                      timed_out = True
                      process.kill()
                      break

              if timed_out:
                  return_code = 124
              else:
                  return_code = process.wait()

          with open(build_log, "r", errors="replace") as log_file:
              lines = log_file.readlines()[-200:]

          if return_code != 0:
              print("\\n--- Last 200 xcodebuild log lines ---")
              sys.stdout.writelines(lines)

          if return_code == 124:
              print("xcodebuild timed out after 20 minutes", file=sys.stderr)

          sys.exit(return_code)
          PY

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
